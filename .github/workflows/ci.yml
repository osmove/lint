name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.7.1

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter lint typecheck

      - name: Lint
        run: pnpm --filter lint lint

      - name: Security audit
        run: pnpm --filter lint security:audit

      - name: Build
        run: pnpm --filter lint build

      - name: Package check
        run: pnpm --filter lint package:check

      - name: Quality gate
        run: pnpm --filter lint quality-gate

      - name: Test
        run: pnpm --filter lint test

      - name: Type check (server)
        run: pnpm --filter lint-server typecheck

      - name: Build (server)
        run: pnpm --filter lint-server build

      - name: Test (server)
        run: pnpm --filter lint-server test

  publish:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.7.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter lint build
      - run: pnpm --filter lint publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
