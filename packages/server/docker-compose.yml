services:
  lint-server:
    # Pull from GHCR by default. To build locally instead, comment `image:` and
    # uncomment the `build:` block below.
    image: ghcr.io/osmove/lint-server:latest
    # build:
    #   context: ../..
    #   dockerfile: packages/server/Dockerfile
    container_name: lint-server
    ports:
      - "3001:3001"
    volumes:
      - lint-server-data:/data
    environment:
      LOG_LEVEL: info
      LINT_SERVER_CORS_ORIGIN: "*"
    restart: unless-stopped

volumes:
  lint-server-data:
