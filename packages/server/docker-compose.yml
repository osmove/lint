services:
  lint-server:
    build:
      context: ../..
      dockerfile: packages/server/Dockerfile
    image: osmove/lint-server:dev
    container_name: lint-server
    ports:
      - "3001:3001"
    volumes:
      - lint-server-data:/data
    environment:
      LOG_LEVEL: info
      LINT_SERVER_CORS_ORIGIN: "*"
    restart: unless-stopped

volumes:
  lint-server-data:
